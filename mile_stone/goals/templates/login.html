{% extends "master.html" %}

{% block content %}

<h2>Login</h2>

<form method="POST">
    {% csrf_token %}

    <input name="username" placeholder="Username"><br><br>
    <input name="password" type="password" placeholder="Password"><br><br>

    <button type="submit">Login</button>
</form>
<p>Don't have an account? <a href="/register/">Register</a></p>

{% endblock %}
